<section class="secao-contato">
    <h1>Fale Conosco </h1>

    <div class="container-contato">
        <form class="formulario-contato">
            <input type="text" placeholder="Nome" name="nome">
            <input type="email" placeholder="Email" name="email">
            <textarea placeholder="Mensagem" name="mensagem" id="mensagem"></textarea>
            <button type="submit" class="btn-enviar">Enviar</button>
        </form>

        <div class="info-contato">
            <div class="item-info">
                <h3>Endereço</h3>
                <p>Rua João e Maria, nº 23</p>
                <p>Bairro Pet - Cidade/SC</p>
            </div>
            <div class="item-info">
                <h3>Telefone</h3>
                <p>(49) 99999-9999</p>
            </div>
            <div class="item-info">
                <h3>Horário</h3>
                <p>09:00 - 20:00</p>
            </div>
        </div>

        <div class="mapa-contato">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3536.123456789!2d-48.1234567!3d-27.1234567!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjfCsDA3JzM0LjQiUyA0OMKwMDcnMjQuNCJX!5e0!3m2!1spt-BR!2sbr!4v1234567890" 
                width="100%" height="200" style="border:0; border-radius: 15px;" allowfullscreen="" loading="lazy">
            </iframe>
            <div class="redes-sociais">
                <span>📘</span> <span>📸</span> <span>🐦</span> <span>🎥</span>
            </div>
        </div>
    </div>
</section>
